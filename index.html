<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Flashcards</title>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Flashcards</h1>
            <p id="progress">Card 1 of 8</p>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button class="btn btn-flip" id="flipBtn">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
                Flip
            </button>
            <button class="btn btn-shuffle" id="shuffleBtn">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Shuffle
            </button>
            <button class="btn btn-restart" id="restartBtn">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Restart
            </button>
        </div>

        <!-- Flashcard -->
        <div class="card-container">
            <div class="flashcard" id="flashcard">
                <div class="card-content">
                    <div class="card-type" id="cardType">Question</div>
                    <p class="card-text" id="cardText">What is React?</p>
                </div>
            </div>
            <div class="flip-indicator">
                <svg class="icon icon-only" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
            </div>
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <button class="btn btn-nav" id="prevBtn">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Previous
            </button>

            <div class="progress-dots" id="progressDots">
                <!-- Dots will be generated by JavaScript -->
            </div>

            <button class="btn btn-nav" id="nextBtn">
                Next
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <p>Click the card or press <span class="kbd">Space</span> to flip</p>
            <p>Use <span class="kbd">←</span> <span class="kbd">→</span> arrow keys to navigate</p>
        </div>
    </div>

    <script src="index.js"></script>    

</body>
</html>
